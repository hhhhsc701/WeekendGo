mcp:
  timeout_seconds: 30
  servers:
    amap-mcp:
      enabled: true
      mode: local
      initialize_timeout_seconds: 15
      retry_attempts: 2
      retry_backoff_seconds: 0.5
      command: npx
      args:
        - -y
        - "@amap/amap-maps-mcp-server"
      env:
        AMAP_MAPS_API_KEY: ${AMAP_API_KEY}
      tools:
        - maps_geo
        - maps_regeocode
        - maps_around_search
        - maps_text_search
        - maps_search_detail
        - maps_weather
        - maps_bicycling
        - maps_direction_driving
        - maps_direction_walking
        - maps_direction_transit_integrated
        - maps_distance
        - maps_ip_location

    google-maps-mcp:
      enabled: true
      mode: local
      initialize_timeout_seconds: 15
      retry_attempts: 2
      retry_backoff_seconds: 0.5
      command: npx
      args:
        - -y
        - "@cablate/mcp-google-map"
      env:
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}  # 可选
      tools:
        - geocode
        - maps_search_nearby
        - maps_plan_route

    # Weather MCP（Local模式，使用官方 NOAA + Open-Meteo）
    weather:
      enabled: true
      mode: local
      timeout_seconds: 8
      initialize_timeout_seconds: 15
      retry_attempts: 2
      retry_backoff_seconds: 0.5
      command: npx
      args:
        - -y
        - "@dangahagan/weather-mcp@latest"
      env:
        ENABLED_TOOLS: full
      tools:
        - get_forecast
        - search_location

    # 12306 MCP（Local模式，已封装查询逻辑）
    train-12306:
      enabled: true
      mode: local
      initialize_timeout_seconds: 15
      retry_attempts: 2
      retry_backoff_seconds: 0.5
      command: npx
      args:
        - -y
        - 12306-mcp
      env: {}
      tools:
        - get-current-date
        - get-tickets
        - get-interline-tickets
        - get-station-code-of-citys
        - get-stations-code-in-city
        - get-station-code-by-names
        - get-station-by-telecode
        - get-train-route-stations

  # 默认路由配置
  routes:
    domestic:
      primary: amap-mcp
      shared:
        - weather
        - train-12306
    international:
      primary: google-maps-mcp
      shared:
        - weather
