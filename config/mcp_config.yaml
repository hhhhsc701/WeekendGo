mcp:
  timeout_seconds: 30
  servers:
    amap-mcp:
      enabled: true
      mode: local
      initialize_timeout_seconds: 15
      retry_attempts: 2
      retry_backoff_seconds: 0.5
      command: npx
      args:
        - -y
        - "@amap/amap-maps-mcp-server"
      env:
        AMAP_MAPS_API_KEY: ${AMAP_API_KEY}
      tools:
        - geocode
        - search_poi_around
        - driving_route_planning

    google-maps-mcp:
      enabled: true
      mode: local
      initialize_timeout_seconds: 15
      retry_attempts: 2
      retry_backoff_seconds: 0.5
      command: npx
      args:
        - -y
        - "@cablate/mcp-google-map"
      env:
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}  # 可选
      tools:
        - geocode
        - maps_search_nearby
        - maps_plan_route

    # Weather MCP（Local模式，使用官方 NOAA + Open-Meteo）
    weather:
      enabled: true
      mode: local
      timeout_seconds: 8
      initialize_timeout_seconds: 15
      retry_attempts: 2
      retry_backoff_seconds: 0.5
      command: npx
      args:
        - -y
        - "@dangahagan/weather-mcp@latest"
      env:
        ENABLED_TOOLS: full
      tools:
        - get_forecast
        - search_location

    # 12306 MCP（Local模式，已封装查询逻辑）
    train-12306:
      enabled: true
      mode: local
      initialize_timeout_seconds: 15
      retry_attempts: 2
      retry_backoff_seconds: 0.5
      command: npx
      args:
        - -y
        - 12306-mcp
      env: {}
      tools:
        - query_trains

  # 默认路由配置
  routes:
    domestic:
      primary: amap-mcp
      shared:
        - weather
        - train-12306
    international:
      primary: google-maps-mcp
      shared:
        - weather
