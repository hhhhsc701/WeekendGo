mcp:
  timeout_seconds: 30
  servers:
    # API模式：直接HTTP调用高德API（推荐生产环境）
    amap-api:
      enabled: true
      mode: api
      api_url: https://restapi.amap.com/v3
      api_key: ${AMAP_API_KEY}
      tools:
        - geocode
        - search_poi
        - get_weather

    # Local模式：通过npx启动MCP Server（适合开发环境）
    amap-mcp:
      enabled: false  # 切换为true时使用Local模式
      mode: local
      command: npx
      args:
        - -y
        - "@amap/amap-maps-mcp-server"
      env:
        AMAP_MAPS_API_KEY: ${AMAP_API_KEY}
      tools:
        - geocode
        - search_poi_around
        - driving_route_planning
        - get_weather

    # Google Maps API模式
    google-maps-api:
      enabled: true
      mode: api
      api_url: https://maps.googleapis.com/maps/api
      api_key: ${GOOGLE_MAPS_API_KEY}
      tools:
        - geocode
        - place/nearbysearch

    # Google Maps Local模式
    google-maps-mcp:
      enabled: false
      mode: local
      command: npx
      args:
        - -y
        - "@cablate/mcp-google-map"
      env:
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      tools:
        - geocode
        - maps_search_nearby
        - maps_plan_route

    # Weather MCP（Local模式，封装便捷）
    weather:
      enabled: true
      mode: local
      command: npx
      args:
        - -y
        - weather-mcp
      env: {}
      tools:
        - search_location
        - get_forecast

    # 12306 MCP（Local模式，已封装查询逻辑）
    train-12306:
      enabled: true
      mode: local
      command: npx
      args:
        - -y
        - 12306-mcp
      env: {}
      tools:
        - query_trains

  # 默认路由配置
  routes:
    domestic:
      primary: amap-api
      shared:
        - weather
        - train-12306
    international:
      primary: google-maps-api
      shared:
        - weather